services:
  mclabs-tools:
    build: .
    container_name: mclabs-tools
    restart: unless-stopped
    ports:
      # Local testing: all interfaces. For production behind Caddy change to "127.0.0.1:8000:8000".
      - "0.0.0.0:8000:8000"
    environment:
      # Values come from .env (gitignored) with the defaults below as fallback.
      TZ: ${TZ:-America/Los_Angeles}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_ENABLED: ${NTFY_ENABLED:-0}
      APP_URL: ${APP_URL:-}
      # Discord OAuth + JWT (required for the auth flow)
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-}
      JWT_SECRET: ${JWT_SECRET:-}
      # Comma-separated list of allowed CORS origins
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8000}
    volumes:
      # Persist votes, config, price history, and the crops dataset across rebuilds.
      - mclabs-data:/app/backend/data

volumes:
  mclabs-data:
