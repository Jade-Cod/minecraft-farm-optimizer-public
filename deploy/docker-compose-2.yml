# Production compose override — run from the deploy/ directory:
#   docker compose -f ../docker-compose.yml -f docker-compose.yml up -d --build
#
# Requires deploy/.env with:
#   APP_DOMAIN=yourdomain.com
#   DISCORD_CLIENT_ID / DISCORD_CLIENT_SECRET / DISCORD_REDIRECT_URI
#   JWT_SECRET / ALLOWED_ORIGINS
#   (plus all vars from the root .env.example)

services:
  mclabs-tools:
    # Build context is the repo root (one level up from deploy/).
    build:
      context: ..
      dockerfile: ../Dockerfile
    # Override the loopback binding — only Caddy reaches this port on the same Docker network.
    ports: []
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: mclabs-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    depends_on:
      - mclabs-tools
    networks:
      - web

networks:
  web:

volumes:
  caddy-data:
  caddy-config:
